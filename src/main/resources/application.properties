spring.application.name=spring-demo
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.org.springframework=INFO
logging.level.com.techup=DEBUG

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.config.import=optional:classpath:application-local.properties

# ✅ [Security Fix #2] JWT config — ค่าจริงต้องเซ็ตใน environment variable ชื่อ JWT_SECRET
# ห้ามใส่ secret จริงในไฟล์นี้ และห้าม commit ไฟล์ application-local.properties ขึ้น Git!
jwt.secret=${JWT_SECRET:changeme-replace-this-with-a-long-random-secret-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ✅ Google OAuth Client ID — ต้องตรงกับ VITE_GOOGLE_CLIENT_ID ใน Frontend
google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id.apps.googleusercontent.com}

# ✅ [Security Fix #5] CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
