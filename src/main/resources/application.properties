spring.application.name=spring-demo
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.org.springframework=INFO
logging.level.com.techup=DEBUG

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.config.import=optional:classpath:application-local.properties

jwt.secret=${JWT_SECRET:changeme-replace-this-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost:5173}
